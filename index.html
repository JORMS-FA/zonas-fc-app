<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZONAS FC PRO</title>
<link rel="manifest" href="manifest.json">
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
:root{
--blue:#38bdf8;
--green:#22c55e;
--lgreen:#84cc16;
--yellow:#eab308;
--orange:#f97316;
--red:#ef4444;
}
*{box-sizing:border-box}
body{margin:0;font-family:'Segoe UI',sans-serif;background:#000;color:#e2e8f0}
.container{max-width:420px;margin:auto;padding:16px}
.card{background:#0f172a;padding:18px;border-radius:20px;box-shadow:0 0 30px rgba(56,189,248,0.08)}
h1{text-align:center;background:linear-gradient(90deg,var(--blue),var(--green));-webkit-background-clip:text;color:transparent}
input{width:100%;padding:14px;border-radius:14px;border:none;text-align:center;margin-top:10px}
.actions{display:flex;justify-content:center;gap:10px;margin-top:10px;flex-wrap:wrap}
button{padding:12px;border-radius:14px;border:none;font-weight:bold;cursor:pointer;background:linear-gradient(90deg,var(--blue),var(--green));color:#000}
.table{width:100%;margin-top:12px;border-collapse:collapse}
.table td,.table th{padding:12px;border-bottom:1px solid #1e293b;text-align:center}
.bar{display:flex;height:36px;margin-top:16px;border-radius:14px;overflow:hidden}
.segment{display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:bold;color:#000}
.popup{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);justify-content:center;align-items:center}
.popup-content{background:#0f172a;padding:20px;border-radius:20px;width:90%;max-width:420px;color:#e2e8f0}
.section{margin-top:15px;font-size:13px;text-align:center}
</style>
</head>
<body>

<div class="container">
<div class="card">
<h1>📈 ZONAS FC PRO</h1>
<p style="text-align:center;font-size:13px">Basado en umbral de lactato 🧠 más preciso que FC máx</p>
<input type="number" id="lt" placeholder="Ingresa tu umbral">
<div class="actions">
<button onclick="calc()">Calcular</button>
<button onclick="mostrarActual()">Ver</button>
</div>

<table class="table">
<tr><th>Zona</th><th>ppm</th></tr>
<tr><td>Z1 🟢</td><td id="z1"></td></tr>
<tr><td>Z2 🟩</td><td id="z2"></td></tr>
<tr><td>Z3 🟨</td><td id="z3"></td></tr>
<tr><td>Z4 🟧</td><td id="z4"></td></tr>
<tr><td>Z5 🟥</td><td id="z5"></td></tr>
</table>

<div class="bar" id="bar"></div>

<div class="section" id="vtinfo"></div>

</div>
</div>

<div class="popup" id="popup">
<div class="popup-content" id="capture">
<h2>📊 Mis zonas</h2>
<div id="tablaPopup"></div>
<div id="barPopup" class="bar"></div>
<div id="vtPopup" class="section"></div>
<div class="actions">
<button onclick="descargar()">📥 Descargar</button>
<button onclick="cerrar()">Cerrar</button>
</div>
</div>
</div>

<script>
function getEl(id){return document.getElementById(id)}

function getZonas(lt){
let z1=Math.round(lt*0.75);
let z2=Math.round(lt*0.85);
let z3=Math.round(lt*0.92);
let z4=Math.round(lt*0.99);
return {z1,z2,z3,z4,lt};
}

function renderVT(lt,id){
let {z2,z4}=getZonas(lt);
getEl(id).innerHTML=`
<p>🫁 VT1 ≈ ${z2} ppm (inicio zona aeróbica)</p>
<p>🔥 VT2 ≈ ${lt} ppm (límite máximo sostenible)</p>`;
}

function calc(){
let lt=parseInt(getEl("lt").value);
if(!lt) return;
let {z1,z2,z3,z4}=getZonas(lt);

getEl("z1").textContent="< "+z1;
getEl("z2").textContent=z1+"-"+z2;
getEl("z3").textContent=z2+"-"+z3;
getEl("z4").textContent=z3+"-"+z4;
getEl("z5").textContent="≥ "+lt;

getEl("bar").innerHTML=`
<div class="segment" style="background:#22c55e;width:20%">< ${z1}</div>
<div class="segment" style="background:#84cc16;width:20%">${z1}-${z2}</div>
<div class="segment" style="background:#eab308;width:20%">${z2}-${z3}</div>
<div class="segment" style="background:#f97316;width:20%">${z3}-${z4}</div>
<div class="segment" style="background:#ef4444;width:20%">≥ ${lt}</div>`;

renderVT(lt,"vtinfo");
}

function mostrarActual(){
let lt=parseInt(getEl("lt").value);
if(!lt) return;
let {z1,z2,z3,z4}=getZonas(lt);

getEl("tablaPopup").innerHTML=`
<table class="table">
<tr><td>Z1</td><td>< ${z1}</td></tr>
<tr><td>Z2</td><td>${z1}-${z2}</td></tr>
<tr><td>Z3</td><td>${z2}-${z3}</td></tr>
<tr><td>Z4</td><td>${z3}-${z4}</td></tr>
<tr><td>Z5</td><td>≥ ${lt}</td></tr>
</table>`;

getEl("barPopup").innerHTML=getEl("bar").innerHTML;
renderVT(lt,"vtPopup");
getEl("popup").style.display="flex";
}

function descargar(){
html2canvas(getEl("capture"),{
backgroundColor:'#0f172a',
scale:3,
useCORS:true
}).then(canvas=>{
let link=document.createElement("a");
link.download="zonas.png";
link.href=canvas.toDataURL("image/png");
link.click();
});
}

function cerrar(){getEl("popup").style.display="none"}
</script>

</body>
</html>
