<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zonas FC PRO</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: #e2e8f0;
  text-align: center;
  padding:20px;
}

.container {
  max-width: 500px;
  margin: auto;
  background: #1e293b;
  padding:20px;
  border-radius: 12px;
}

h1 { color: #38bdf8; }

input {
  padding:10px;
  font-size:18px;
  margin:10px;
  border-radius:8px;
  border:none;
  text-align:center;
}

table {
  width:100%;
  margin-top:10px;
}

td, th {
  padding:10px;
  border-bottom:1px solid #334155;
}

.bar {
  display:flex;
  height:20px;
  margin-top:20px;
  border-radius:8px;
  overflow:hidden;
}

.segment {
  height:100%;
}
</style>

</head>
<body>

<div class="container">

<h1>Zonas FC PRO</h1>

<p>
Basado en umbral:<br>
Z1 &lt;75%<br>
Z2 75–85%<br>
Z3 85–92%<br>
Z4 92–99%<br>
Z5 ≥100%
</p>

<input type="number" id="lt" placeholder="Ingresa tu umbral" oninput="calc()">

<table>
<tr><th>Zona</th><th>Rango</th></tr>
<tr><td>Z1</td><td id="z1"></td></tr>
<tr><td>Z2</td><td id="z2"></td></tr>
<tr><td>Z3</td><td id="z3"></td></tr>
<tr><td>Z4</td><td id="z4"></td></tr>
<tr><td>Z5</td><td id="z5"></td></tr>
</table>

<div class="bar" id="grafica"></div>

</div>

<script>
function calc() {
  let lt = document.getElementById("lt").value;
  if(!lt) return;

  let zonas = [
    [0,0.75],
    [0.75,0.85],
    [0.85,0.92],
    [0.92,0.99],
    [1,1.1]
  ];

  let colores = ["#22c55e","#84cc16","#eab308","#f97316","#ef4444"];

  document.getElementById("z1").innerText = "< "+Math.round(lt*0.75);
  document.getElementById("z2").innerText = Math.round(lt*0.75)+"-"+Math.round(lt*0.85);
  document.getElementById("z3").innerText = Math.round(lt*0.85)+"-"+Math.round(lt*0.92);
  document.getElementById("z4").innerText = Math.round(lt*0.92)+"-"+Math.round(lt*0.99);
  document.getElementById("z5").innerText = "≥ "+Math.round(lt);

  let grafica = "";

  zonas.forEach((z,i)=>{
    let width = (z[1]-z[0])*100;
    grafica += `<div class="segment" style="width:${width}%; background:${colores[i]}"></div>`;
  });

  document.getElementById("grafica").innerHTML = grafica;
}
</script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
