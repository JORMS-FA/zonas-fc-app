<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Zonas FC PRO</title>

<link rel="manifest" href="manifest.json">

<style>
body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background:#0f172a;
  color:#e2e8f0;
  text-align:center;
}

.container {
  max-width:400px;
  margin:auto;
  padding:20px;
}

.card {
  background:#1e293b;
  padding:20px;
  border-radius:15px;
}

h1 {
  color:#38bdf8;
}

input {
  width:100%;
  padding:12px;
  margin-top:10px;
  font-size:18px;
  border-radius:10px;
  border:none;
  text-align:center;
}

button {
  margin:10px 5px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#38bdf8;
  color:black;
  font-weight:bold;
  cursor:pointer;
}

table {
  width:100%;
  margin-top:15px;
}

td, th {
  padding:10px;
  border-bottom:1px solid #334155;
}

/* Barra Garmin */
.bar {
  display:flex;
  height:25px;
  margin-top:20px;
  border-radius:10px;
  overflow:hidden;
}

.bar div {
  height:100%;
}

/* Popup */
#popup {
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
}

.popup-content {
  background:#1e293b;
  padding:20px;
  border-radius:15px;
  width:80%;
  max-width:300px;
}
</style>

</head>

<body>

<div class="container">

<div class="card">

<h1>Zonas FC</h1>
<p>Basado en umbral (LTHR)</p>

<input type="number" id="lt" placeholder="Ingresa tu umbral" oninput="calc()">

<button onclick="guardar()">Guardar</button>
<button onclick="mostrar()">Ver mis zonas</button>

<table>
<tr><th>Zona</th><th>Rango</th></tr>
<tr><td>Z1</td><td id="z1"></td></tr>
<tr><td>Z2</td><td id="z2"></td></tr>
<tr><td>Z3</td><td id="z3"></td></tr>
<tr><td>Z4</td><td id="z4"></td></tr>
<tr><td>Z5</td><td id="z5"></td></tr>
</table>

<div class="bar">
  <div style="background:#22c55e;width:20%"></div>
  <div style="background:#84cc16;width:20%"></div>
  <div style="background:#eab308;width:20%"></div>
  <div style="background:#f97316;width:20%"></div>
  <div style="background:#ef4444;width:20%"></div>
</div>

</div>

</div>

<!-- POPUP -->
<div id="popup">
  <div class="popup-content">
    <h2>Mis zonas</h2>
    <div id="zonasGuardadas"></div>
    <button onclick="cerrar()">Cerrar</button>
  </div>
</div>

<script>
function calc(){
let lt=document.getElementById("lt").value;
if(!lt)return;

document.getElementById("z1").innerText="< "+Math.round(lt*0.75);
document.getElementById("z2").innerText=Math.round(lt*0.75)+"-"+Math.round(lt*0.85);
document.getElementById("z3").innerText=Math.round(lt*0.85)+"-"+Math.round(lt*0.92);
document.getElementById("z4").innerText=Math.round(lt*0.92)+"-"+Math.round(lt*0.99);
document.getElementById("z5").innerText="≥ "+Math.round(lt);
}

function guardar(){
let lt=document.getElementById("lt").value;
if(!lt)return;

localStorage.setItem("umbral", lt);
alert("Guardado ✅");
}

function mostrar(){
let lt=localStorage.getItem("umbral");

if(!lt){
alert("No has guardado zonas");
return;
}

let html=`
<p>Z1: < ${Math.round(lt*0.75)}</p>
<p>Z2: ${Math.round(lt*0.75)} - ${Math.round(lt*0.85)}</p>
<p>Z3: ${Math.round(lt*0.85)} - ${Math.round(lt*0.92)}</p>
<p>Z4: ${Math.round(lt*0.92)} - ${Math.round(lt*0.99)}</p>
<p>Z5: ≥ ${Math.round(lt)}</p>
`;

document.getElementById("zonasGuardadas").innerHTML=html;
document.getElementById("popup").style.display="flex";
}

function cerrar(){
document.getElementById("popup").style.display="none";
}

if ('serviceWorker' in navigator) {
navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
